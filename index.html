<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Palette Generator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="icon/color-palette.png" type="image/.png" />
  </head>
  <body>
    <div class="container">
      <h1 class="title">Color Palette Generator</h1>

      <button class="genPalette-btn" id="genPalette-btn">
        <i class="fa-solid fa-arrows-rotate"></i>
        Generate Palette
      </button>

      <div class="palette-container">
        <div class="color-box">
          <div class="color" style="background-color: #7c5c8c"></div>
          <div class="color-info">
            <span class="hex-code">#7C5C8C</span>
            <i
              class="fa-solid fa-clone copy-btn"
              title="copy text to clipboard"
            ></i>
          </div>
        </div>
        <div class="color-box">
          <div class="color" style="background-color: #0abd0b"></div>
          <div class="color-info">
            <span class="hex-code">#0ABD0B</span>
            <i
              class="fa-solid fa-clone copy-btn"
              title="copy text to clipboard"
            ></i>
          </div>
        </div>
        <div class="color-box">
          <div class="color" style="background-color: #2506a7"></div>
          <div class="color-info">
            <span class="hex-code">#2506A7</span>
            <i
              class="fa-solid fa-clone copy-btn"
              title="copy text to clipboard"
            ></i>
          </div>
        </div>
        <div class="color-box">
          <div class="color" style="background-color: #2f1baa"></div>
          <div class="color-info">
            <span class="hex-code">#2F1BAA</span>
            <i
              class="fa-solid fa-clone copy-btn"
              title="copy text to clipboard"
            ></i>
          </div>
        </div>
        <div class="color-box">
          <div class="color" style="background-color: #e45779"></div>
          <div class="color-info">
            <span class="hex-code">#E45779</span>
            <i
              class="fa-solid fa-clone copy-btn"
              title="copy text to clipboard"
            ></i>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script
      src="https://kit.fontawesome.com/783d5fc8be.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
